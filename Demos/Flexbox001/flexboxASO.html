<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Justify-Content</title>
    <style>
        h1,
        h2 {text-align: center;}
        #one {background-color: lightcoral;}
        #two {background-color: lightseagreen; align-self: flex-start;}
        #three {background-color: lightpink; order: 0;}
        #four {background-color: lightsteelblue; align-self: flex-end; order: 0;}
        #five {background-color: lightyellow; order: 0;}
        #container001 { border: 5px solid black; background-color: lightblue;  margin: 1rem;  display: flex;  justify-content: flex-end; justify-content: center; justify-content: flex-start;justify-content: space-between;justify-content: space-around;justify-content: space-evenly;
        }
        #container002 { border: 5px solid black; background-color: coral;margin: 1rem;display: flex; flex-direction: row-reverse; justify-content: space-evenly;}

        #container003 {border: 5px solid black;background-color: crimson; margin: 1rem; display: flex; flex-direction: row; align-items: center;  justify-content: flex-end;  height: 700px;
}
        .box {border: 1px solid black; background-color: lightgreen; width: 100px; height: 100px; padding: .5rem;}
        @media screen and (min-width:800px) {
        body { background-color: lightslategrey;
            }
}
        @media screen and (min-width:1000px) {body {background-color: brown; }
    }
    </style>
</head>

<body>
    <h1>Flexbox</h1>
    <h2>Justify-Content</h2>
    <ul>
        <li>flex-end</li>
        <li>center</li>
        <li>flex-start</li>
        <li>space-between</li>
        <li>space-around</li>
        <li>space-evenly</li>
    </ul>

    <h2>Container001</h2>
    <div id="container001">
        <div class="box">Item001</div>
        <div class="box">Item002</div>
        <div class="box">Item003</div>
        <div class="box">Item004</div>
        <div class="box">Item005</div>
    </div>
    <h2>Container002</h2>
    <div id="container002">
        <div class="box">Item001</div>
        <div class="box">Item002</div>
        <div class="box">Item003</div>
        <div class="box">Item004</div>
        <div class="box">Item005</div>
    </div>
    <h2>Container003</h2>
    <div id="container003">
        <div id="one" class="box">Item001</div>
        <div id="two" class="box">Item002</div>
        <div id="three" class="box">Item003</div>
        <div id="four" class="box">Item004</div>
        <div id="five" class="box">Item005</div>
    </div>

</body>

</html>
