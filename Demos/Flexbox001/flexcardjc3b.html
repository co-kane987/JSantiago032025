<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBoxJC3A</title>
    <style>
        body {
            background-color: magenta;
        }

        h1 {
            color: white;
            text-align: center;
        }

        #wrapper {
            border: 5px solid black;
            background-color: white;
            width: 50%;
            min-width: 600px;
            margin: auto;
            padding: 1rem;
        }

        .card {
            border-radius: 10px 0px 10px 0px;
            height: 100px;
            font-size: 2rem;
            padding: 1rem;
            width: 100px;
            background-color: lime;
            border: 5px solid black;
            margin: 1rem;
            text-align: center;
        }
        .group1 {
            display: flex;
            border: 4px dashed black;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
        }
        .group2 {
            display: flex;
            border: 4px dashed black;
            margin-bottom: 1rem;
            display: flex;
            justify-content: center;
        }
        .group3 {
            display: flex;
            border: 4px dashed black;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-evenly;
        }
        .group4 {
            display: flex;
            border: 4px dashed black;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-evenly;
        }
        .group5 {
            display: flex;
            border: 4px dashed black;
            margin-bottom: 1rem;
                display: flex;
            justify-content: flex-end
        }
        .group6 {
            display: flex;
            border: 4px dashed black;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-around; background-color: magenta;
        }
        .group7 {
            display: flex;
            border: 4px dashed black;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>
    <h1>FlexBoxJC3A</h1>
    <div id="wrapper">

        <div class="group1">
            <div class="card">001</div>
            <div class="card">002</div>
        </div>

        <div class="group2">
            <div class="card">003</div>
            <div class="card">004</div>
            <div class="card">005</div>
        </div>

        <div class="group3">
            <div class="card">006</div>
            <div class="card">007</div>
            <div class="card">008</div>
            <div class="card">009</div>
        </div>

        <div class="group4">
            <div class="card">010</div>
            <div class="card">011</div>
            <div class="card">012</div>
        </div>

        <div class="group5">
            <div class="card">013</div>
            <div class="card">014</div>
        </div>

        <div class="group6">
            <div class="card">015</div>
            <div class="card">016</div>
            <div class="card">017</div>
            <div class="card">018</div>
            <div class="card">019</div>
        </div>

        <div class="group7">
            <div class="card">020</div>

        </div>


    </div>
</body>

</html>
