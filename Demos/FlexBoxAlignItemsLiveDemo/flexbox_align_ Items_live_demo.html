<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox ALign Items Live Demo</title>
    <style>
        #flexparent{
            display: flex;
            width: 600px;
            height: 600px;
            background-color: rgb(229, 153, 230);
            border: 2px solid black;
            margin: auto;
            flex-direction: column;
            justify-content: center;
        }
        .flexchildren{
            width: 100px;
            height: 100px;
            background-color: lightcoral;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    
<h1>FlexBox ALign Items Live Demo</h1>
<div id="flexparent">
    <div class="flexchildren">1</div>
    <div class="flexchildren">2</div>
    <div class="flexchildren">3</div>
    <div class="flexchildren">4</div>
</div>
</body>
</html>
