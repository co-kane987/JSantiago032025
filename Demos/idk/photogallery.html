<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlexboxPhoto Gallery</title>
    <style>
      h1 {
        text-align: center;
        color: #333;
      }
      .gallery {
        background-color: lightblue;
        border: 4px solid black;
        width: 90%;
        max-width: 1200px;
        margin: auto;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
      }
      figure {
        background-color: whitesmoke;
        width: 100%;
        max-width: 250px;
        padding: 1rem;
        margin: 1rem;
      }
      figcaption {
        text-align: center;
        color: #333;
      }
      img {
        width: 100%;
        aspect-ratio: 1/1;
      }
    </style>
  </head>
  <body>
    <h1>Flexbox Photo Gallery</h1>

    <div class="gallery">
      <figure>
        <img
          src="https://loremflickr.com/400/400/nature"
          alt="Nature"
        />
        <figcaption>Nature</figcaption>
      </figure>
      <figure>
        <img
          src="https://loremflickr.com/400/400/city"
          alt="City"
        />
        <figcaption>City</figcaption>
      </figure>
      <figure>
        <img
          src="https://loremflickr.com/400/400/technology"
          alt="Technology"
        />
        <figcaption>Technology</figcaption>
      </figure>
      <figure>
        <img
          src="https://loremflickr.com/400/400/animals"
          alt="Animals"
        />
        <figcaption>Animals</figcaption>
      </figure>
      <figure>
        <img
          src="https://loremflickr.com/400/400/abstract"
          alt="Abstract"
        />
        <figcaption>Abstract</figcaption>
      </figure>
      <figure>
        <img
          src="https://loremflickr.com/400/400/architecture"
          alt="Architecture"
        />
        <figcaption>Architecture</figcaption>
      </figure>
      <figure>
        <img
          src="https://loremflickr.com/400/400/business"
          alt="Business"
        />
        <figcaption>Business</figcaption>
      </figure>
      <figure>
        <img
          src="https://loremflickr.com/400/400/sports"
          alt="Sports"
        />
        <figcaption>Sports</figcaption>
      </figure>
      <figure>
        <img
          src="https://loremflickr.com/400/400/music"
          alt="Music"
        />
        <figcaption>Music</figcaption>
      </figure>
      <figure>
        <img
          src="https://loremflickr.com/400/400/food"
          alt="Food"
        />
        <figcaption>Food</figcaption>
      </figure>
      <figure>
        <img
          src="https://loremflickr.com/400/400/travel"
          alt="Travel"
        />
        <figcaption>Travel</figcaption>
      </figure>
    </div>
  </body>
</html>
