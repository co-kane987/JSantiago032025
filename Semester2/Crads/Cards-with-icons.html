<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards w/ icons</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin=" anonymous" referrerpolicy="no-referrer" />
    <style>
        body {background-color: slateblue; color: antiquewhite; font-family: Arial, Helvetica, sans-serif;
        line-height: 1.5;}
        h1 , h2 {text-align: center;}
        .fbcard{border: 1px solid antiquewhite; background-color: firebrick; padding: 1rem; max-width: 1280px; margin: 0 auto;}
        .cardcircle{background-color: rgb(170, 48, 48); width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; font-size: 24px; border-radius: 50%;}
        .card{background-color: blue; padding: 1rem; border: 2px solid antiquewhite; border-radius: 10px;text-align: center;}
    </style>
</head>
<body>
    <h1>Cards w/ icons</h1>
    <h2>Font Awesome</h2>
    <Section id="fbcards">
        <article class="card">
<div class="cardcircle">
    <i class="fa-solid fa-apple-whole"></i>
    <h3>Card Header</h3>
    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Doloremque, nihil facere. Fugiat eius vel molestiae quae </p>
        </article>
    </Section>
</body>
</html>
